<nav class="site-nav">
  <div class="container nav-inner">
    <a class="wordmark" routerLink="/home" aria-label="Off Grid Part Picker home">
      <i class="bi bi-sun-fill sun"></i>
      <span class="wordmark-text">
        <span class="mark-primary inter-semibold">OffGrid</span><span
          class="mark-secondary inter-semibold"
          >PartPicker</span
        >
      </span>
    </a>
    <div class="menu-wrap">
      <button
        class="menu-button"
        aria-label="Open menu"
        [attr.aria-expanded]="menuOpen"
        (click)="toggleMenu()"
      >
        <i class="bi bi-list"></i>
      </button>
      @if (menuOpen) {
        <div class="menu-dropdown">
          <a class="menu-item" routerLink="/builds" (click)="closeMenu()">
            <i class="bi bi-collection"></i>
            <span>My Builds</span>
          </a>
          <button class="menu-item menu-action" type="button" (click)="toggleThemePreference()">
            <i
              class="bi"
              [class.bi-sun-fill]="isDark"
              [class.bi-moon-stars-fill]="!isDark"
            ></i>
            <span>{{ themeToggleLabel }}</span>
          </button>
        </div>
      }
    </div>
  </div>
</nav>
